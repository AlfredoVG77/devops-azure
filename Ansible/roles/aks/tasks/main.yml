#terraform output -raw aks_name
#terraform output -raw aks_rg

---
- name: Recuperar nombre del AKS
  ansible.builtin.command: terraform output -raw aks_name
  register: aks_name_cmd
  changed_when: false

- name: Recuperar RG del AKS
  ansible.builtin.command: terraform output -raw aks_rg
  register: aks_rg_cmd
  changed_when: false

- name: Convertir valores a facts
  ansible.builtin.set_fact:
    aks_name: "{{ aks_name_cmd.stdout }}"
    aks_rg: "{{ aks_rg_cmd.stdout }}"

- name: Obtener credenciales del AKS
  ansible.builtin.command: >
    az aks get-credentials
    --resource-group {{ aks_rg }}
    --name {{ aks_name }}
    --overwrite-existing
  register: creds
  changed_when: false

- name: Aplicar manifiesto Kubernetes
  ansible.builtin.command: >
    kubectl apply -f roles/aks/files/deploy.yaml.j2
  register: apply_output
  changed_when: "'configured' in apply_output.stdout or apply_output.rc == 0"

# Alternativa: con template previo
# - name: Plantillar manifiesto
#   ansible.builtin.template:
#     src: deploy.yaml.j2
#     dest: /tmp/deploy.yaml
#   ...
# - name: kubectl apply
#   ansible.builtin.command: kubectl apply -f /tmp/deploy.yaml

- name: Esperar a que el Deployment esté disponible
  ansible.builtin.command: >
    kubectl rollout status deployment/webapp -n {{ aks_namespace }} --timeout=120s
  register: rollout
  changed_when: false

- name: Obtener servicios del namespace
  ansible.builtin.command: kubectl get svc -n {{ aks_namespace }} -o json
  register: svc_json
  changed_when: false

- name: Parsear IP del LoadBalancer
  ansible.builtin.set_fact:
    lb_ip: "{{ svc_json.stdout | from_json | json_query('items[?metadata.name==`webapp-service`].status.loadBalancer.ingress[0].ip') | first }}"
  when: svc_json.stdout != ""

- name: Mostrar IP pública final de la aplicación
  ansible.builtin.debug:
    msg: "APP disponible en http://{{ lb_ip }}"