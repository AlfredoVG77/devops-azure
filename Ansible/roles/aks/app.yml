- port: 6379
selector:
app: backend
---
apiVersion: apps/v1
kind: Deployment
metadata:
name: frontend
namespace: unir
spec:
replicas: 1
selector:
matchLabels:
app: frontend
template:
metadata:
labels:
app: frontend
spec:
nodeSelector:
kubernetes.io/os: linux
containers:
- name: frontend
image: jsmazuredevops2025.azurecr.io/azure-vote-front:latest
resources:
requests:
cpu: "100m"
memory: "128Mi"
limits:
cpu: "250m"
memory: "256Mi"
ports:
- containerPort: 80
env:
- name: REDIS
value: "backend"
---
apiVersion: v1
kind: Service
metadata:
PA DevOps & Cloud - Marzo del 2025
