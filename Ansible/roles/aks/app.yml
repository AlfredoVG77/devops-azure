---
apiVersion: apps/v1
kind: Deployment
metadata:
name: backend
namespace: unir
spec:
replicas: 1
selector:
matchLabels:
app: backend
template:
metadata:
labels:
app: backend
spec:
containers:
- name: backend
image: jsmazuredevops2025.azurecr.io/unir/redis:6.0.8
env:
- name: ALLOW_EMPTY_PASSWORD
value: "yes"
ports:
- containerPort: 6379
name: redis
---
apiVersion: v1
kind: Service
metadata:
name: backend
spec:
ports:
